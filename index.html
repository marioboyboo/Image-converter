<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Converter</title>
<style>
/* Reset & body */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #ff6ec4, #7873f5);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card container */
.card {
  background: #fff;
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  width: 380px;
  text-align: center;
  transition: transform 0.3s ease;
}
.card:hover {
  transform: translateY(-5px);
}

/* Heading */
h1 {
  font-size: 28px;
  margin-bottom: 20px;
  color: #333;
  font-weight: 700;
}

/* Upload area */
.upload {
  border: 2px dashed #ccc;
  border-radius: 20px;
  padding: 35px;
  cursor: pointer;
  transition: all 0.3s ease;
  color: #666;
  font-size: 16px;
}
.upload:hover {
  border-color: #ff6ec4;
  background: #f9f5ff;
  color: #333;
}

/* Preview image */
#preview {
  max-width: 200px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Dropdown */
select {
  margin-top: 15px;
  padding: 10px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 100%;
  outline: none;
  transition: 0.2s;
}
select:focus {
  border-color: #ff6ec4;
  box-shadow: 0 0 8px rgba(255,110,196,0.3);
}

/* Button */
button {
  margin-top: 20px;
  background: #ff6ec4;
  color: white;
  border: none;
  padding: 12px 25px;
  font-size: 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
}
button:hover {
  background: #e85bb5;
}

/* Download link */
a#downloadLink {
  display: block;
  margin-top: 18px;
  font-weight: 600;
  color: #ff6ec4;
  text-decoration: none;
  transition: 0.3s;
}
a#downloadLink:hover {
  color: #e85bb5;
}

</style>
</head>
<body>

<div class="card">
  <h1>Image Converter</h1>

  <label class="upload">
    Choose Image
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </label>

  <img id="preview" alt="Preview will appear here">

  <select id="format">
    <option value="png">PNG</option>
    <option value="jpeg">JPG</option>
    <option value="webp">WEBP</option>
    <option value="bmp">BMP</option>
    <option value="ico">ICO</option>
  </select>

  <button onclick="convert()">Convert</button>

  <a id="downloadLink" style="display:none">Download</a>
</div>

<script>
let img = new Image();
let ready = false;

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  
  reader.onload = ev => {
    img.onload = () => ready = true;
    img.src = ev.target.result;
    document.getElementById("preview").src = img.src;
  };
  
  reader.readAsDataURL(file);
});

function convert() {
  if(!ready){
    alert("Image still loading");
    return;
  }

  const format = document.getElementById("format").value;
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  if(format !== "ico"){
    const url = canvas.toDataURL("image/" + format);
    download(url, "converted." + format);
  } else {
    canvas.toBlob(async blob => {
      const png = new Uint8Array(await blob.arrayBuffer());
      const header = new Uint8Array(22);
      header[2] = 1;
      header[4] = 1;
      header[10] = 1;
      header[12] = 32;
      const view = new DataView(header.buffer);
      view.setUint32(14, png.length, true);
      view.setUint32(18, 22, true);
      const ico = new Uint8Array(header.length + png.length);
      ico.set(header, 0);
      ico.set(png, header.length);
      const blobOut = new Blob([ico], {type: "image/x-icon"});
      const url = URL.createObjectURL(blobOut);
      download(url, "converted.ico");
    });
  }
}

function download(url, name){
  const link = document.getElementById("downloadLink");
  link.href = url;
  link.download = name;
  link.innerText = "Download " + name;
  link.style.display = "block";
}
</script>

</body>
</html>
