```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Converter</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
display:inline-block;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

select{
font-size:16px;
padding:5px;
}

img{
max-width:250px;
margin-top:15px;
}
</style>
</head>

<body>

<h1>Image Converter</h1>

<div class="box">

<input type="file" id="fileInput" accept="image/*"><br><br>

Convert To:
<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
<option value="bmp">BMP</option>
<option value="ico">ICO</option>
</select>

<br><br>

<button onclick="convert()">Convert</button>

<br>

<img id="preview">

<br><br>

<a id="downloadLink" style="display:none">Download</a>

</div>

<script>

let img = new Image()
let ready = false

document.getElementById("fileInput").addEventListener("change", e=>{

const file = e.target.files[0]
const reader = new FileReader()

reader.onload = ev => {

img.onload = () => {
ready = true
}

img.src = ev.target.result
document.getElementById("preview").src = img.src

}

reader.readAsDataURL(file)

})

function convert(){

if(!ready){
alert("Wait for image to finish loading.")
return
}

const format = document.getElementById("format").value

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

if(format !== "ico"){

const url = canvas.toDataURL("image/"+format)

download(url,"converted."+format)

return
}

makeICO(canvas)

}

function makeICO(sourceCanvas){

const size = 256

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

canvas.width = size
canvas.height = size

ctx.drawImage(sourceCanvas,0,0,size,size)

canvas.toBlob(async blob=>{

const png = new Uint8Array(await blob.arrayBuffer())

const header = new Uint8Array(22)

header[0]=0
header[1]=0
header[2]=1
header[3]=0
header[4]=1
header[5]=0

header[6]=0
header[7]=0
header[8]=0
header[9]=0
header[10]=1
header[11]=0
header[12]=32
header[13]=0

const sizeView = new DataView(header.buffer)
sizeView.setUint32(14,png.length,true)
sizeView.setUint32(18,22,true)

const ico = new Uint8Array(header.length + png.length)

ico.set(header,0)
ico.set(png,header.length)

const blobOut = new Blob([ico],{type:"image/x-icon"})
const url = URL.createObjectURL(blobOut)

download(url,"converted.ico")

})

}

function download(url,name){

const link = document.getElementById("downloadLink")

link.href = url
link.download = name
link.innerText = "Download " + name
link.style.display = "inline"

}

</script>

</body>
</html>
