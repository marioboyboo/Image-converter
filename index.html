<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Converter</title>

<!-- Favicons for all browsers -->
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Manifest for Opera / Chrome Speed Dial -->
<link rel="manifest" href="manifest.json">

<style>
/* Body with horizontal gradient animation */
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(90deg, #001f99, #ff0000, #ff00ff);
  background-size: 400% 400%;
  animation: gradientAnimation 20s ease infinite;
}

@keyframes gradientAnimation {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating shapes container */
.floating-shapes {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  overflow: hidden;
  z-index: 0;
}

/* Floating circles */
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.3;
  background: linear-gradient(90deg, #ff00ff, #ff0000, #001f99);
  animation: floatAnimation linear infinite;
}

@keyframes floatAnimation {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg); }
  50% { transform: translateY(50vh) translateX(50px) rotate(180deg); }
  100% { transform: translateY(-100vh) translateX(-50px) rotate(360deg); }
}

/* Card styling */
.card {
  position: relative;
  z-index: 1;
  background: #0040ff;
  border-radius: 25px;
  padding: 60px;
  width: 600px;
  display: flex;
  flex-direction: column;
  gap: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Buttons & upload */
button, .upload {
  background: #0055ff;
  color: black;
  font-weight: bold;
  font-size: 22px;
  border: none;
  border-radius: 25px;
  padding: 20px;
  cursor: pointer;
  text-align: center;
  transition: background 0.3s;
}

button:hover, .upload:hover {
  background: #0066ff;
}

.upload { display: block; text-align: center; }
.upload input { display: none; }

/* Preview container */
.preview-container {
  position: relative;
  width: 100%;
  height: 300px;
  background: #0055ff;
  border-radius: 25px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  font-weight: bold;
  color: black;
  text-align: center;
  overflow: hidden;
}

#preview {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: none;
  border-radius: 25px;
}

select {
  appearance: none;
  padding: 20px 50px 20px 20px;
  background: #0055ff;
  border-radius: 25px;
  font-size: 22px;
  font-weight: bold;
  color: black;
  cursor: pointer;
  border: none;
}

#downloadLink {
  display: none;
  text-align: center;
  color: black;
  font-weight: bold;
  text-decoration: none;
  padding: 22px;
  border-radius: 25px;
  background: #0055ff;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="floating-shapes" id="shapesContainer"></div>

<div class="card">
<label class="upload">Choose Image
<input type="file" id="fileInput" accept="image/*">
</label>

<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
<option value="bmp">BMP</option>
<option value="ico">ICO</option>
</select>

<div class="preview-container">
<span id="placeholderText">Image shows up here</span>
<img id="preview">
</div>

<button onclick="convert()">Convert</button>

<a id="downloadLink">Download</a>
</div>

<script>
// floating shapes
const container = document.getElementById('shapesContainer');

for (let i = 0; i < 15; i++) {
  const shape = document.createElement('div');
  shape.className = 'shape';

  const size = Math.random() * 80 + 40;
  shape.style.width = size + "px";
  shape.style.height = size + "px";
  shape.style.left = Math.random() * 100 + "%";
  shape.style.animationDuration = 20 + Math.random()*20 + "s";
  shape.style.animationDelay = Math.random()*20 + "s";

  container.appendChild(shape);
}

let img = new Image();
let ready = false;

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    img.onload = () => {
      ready = true;
      preview.style.display = "block";
      placeholderText.style.display = "none";
    };

    img.src = ev.target.result;
    preview.src = img.src;
  };

  reader.readAsDataURL(file);
});

function convert() {

  if(!ready){
    alert("Image still loading");
    return;
  }

  const format = document.getElementById("format").value;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  const url = canvas.toDataURL("image/"+format);

  const link = document.getElementById("downloadLink");

  link.href = url;
  link.download = "converted."+format;
  link.style.display = "block";
}
</script>

</body>
</html>
