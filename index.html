```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Converter</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

.box{
    background:#1e1e1e;
    padding:30px;
    border-radius:10px;
    display:inline-block;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}

select{
    padding:5px;
    font-size:16px;
}

img{
    max-width:250px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Image File Converter</h1>

<div class="box">

<input type="file" id="fileInput" accept="image/*"><br><br>

Convert To:
<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
<option value="bmp">BMP</option>
<option value="ico">ICO</option>
</select>

<br><br>

<button onclick="convertImage()">Convert</button>

<br>

<img id="preview">

<br><br>

<a id="downloadLink" style="display:none;">Download</a>

</div>

<canvas id="canvas" style="display:none"></canvas>

<script>

let img = new Image()
let imageLoaded = false

document.getElementById("fileInput").addEventListener("change", function(e){

    const file = e.target.files[0]
    const reader = new FileReader()

    reader.onload = function(event){

        img.onload = function(){
            imageLoaded = true
        }

        img.src = event.target.result
        document.getElementById("preview").src = img.src
    }

    reader.readAsDataURL(file)
})

function convertImage(){

    if(!imageLoaded){
        alert("Image still loading.")
        return
    }

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    canvas.width = img.width
    canvas.height = img.height

    ctx.clearRect(0,0,canvas.width,canvas.height)
    ctx.drawImage(img,0,0)

    const format = document.getElementById("format").value

    if(format === "ico"){
        createICO()
        return
    }

    const mime = "image/" + format
    const dataURL = canvas.toDataURL(mime)

    const link = document.getElementById("downloadLink")
    link.href = dataURL
    link.download = "converted." + format
    link.innerText = "Download Converted Image"
    link.style.display = "block"
}

function createICO(){

    const size = 64

    const tempCanvas = document.createElement("canvas")
    const ctx = tempCanvas.getContext("2d")

    tempCanvas.width = size
    tempCanvas.height = size

    ctx.clearRect(0,0,size,size)

    const scale = Math.min(size/img.width,size/img.height)

    const w = img.width * scale
    const h = img.height * scale

    const x = (size - w)/2
    const y = (size - h)/2

    ctx.drawImage(img,x,y,w,h)

    tempCanvas.toBlob(function(blob){

        const reader = new FileReader()

        reader.onload = function(){

            const pngData = new Uint8Array(reader.result)

            const header = new Uint8Array([
                0,0,
                1,0,
                1,0,
                size,
                size,
                0,
                0,
                1,0,
                32,0,
                pngData.length,0,0,0,
                22,0,0,0
            ])

            const ico = new Uint8Array(header.length + pngData.length)

            ico.set(header,0)
            ico.set(pngData,header.length)

            const blob = new Blob([ico],{type:"image/x-icon"})

            const url = URL.createObjectURL(blob)

            const link = document.getElementById("downloadLink")
            link.href = url
            link.download = "converted.ico"
            link.innerText = "Download ICO"
            link.style.display = "block"
        }

        reader.readAsArrayBuffer(blob)

    },"image/png")
}

</script>

</body>
</html>
