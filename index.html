<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Converter</title>
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #001f99; /* dark blue background */
}

/* Card */
.card {
  background: #0040ff; /* medium blue */
  border-radius: 25px;
  padding: 50px;
  width: 500px; /* bigger width */
  display: flex;
  flex-direction: column;
  gap: 25px; /* bigger gaps */
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* Buttons & select */
button, .upload, select {
  background: #0055ff; /* brighter blue */
  color: black;
  font-weight: bold;
  font-size: 20px; /* larger font */
  border: none;
  border-radius: 25px;
  padding: 20px;
  cursor: pointer;
  text-align: center;
  transition: background 0.3s;
}

/* Hover effects */
button:hover, .upload:hover, select:hover {
  background: #0066ff;
}

/* Upload label */
.upload {
  display: block;
  text-align: center;
}

/* Hide actual file input */
.upload input {
  display: none;
}

/* Image preview container */
.preview-container {
  position: relative;
  width: 100%;
  height: 250px; /* bigger preview */
  background: #0055ff;
  border-radius: 25px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-size: 20px;
  color: black;
  font-weight: bold;
  text-align: center;
}

/* Actual image */
#preview {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: none; /* hide until loaded */
  border-radius: 25px;
}

/* Select dropdown */
select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  position: relative;
}

/* Download link */
#downloadLink {
  display: none;
  text-align: center;
  color: black;
  font-weight: bold;
  text-decoration: none;
  padding: 20px;
  border-radius: 25px;
  background: #0055ff;
  font-size: 20px;
  transition: background 0.3s;
}
#downloadLink:hover {
  background: #0066ff;
}
</style>
</head>
<body>

<div class="card">
  <label class="upload">Choose Image
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <select id="format">
    <option value="png">PNG</option>
    <option value="jpeg">JPG</option>
    <option value="webp">WEBP</option>
    <option value="bmp">BMP</option>
    <option value="ico">ICO</option>
  </select>

  <div class="preview-container" id="previewContainer">
    <span id="placeholderText">Image shows up here</span>
    <img id="preview" alt="Image shows up here">
  </div>

  <button onclick="convert()">Convert</button>

  <a id="downloadLink">Download</a>
</div>

<script>
let img = new Image();
let ready = false;

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    img.onload = () => {
      ready = true;
      document.getElementById("preview").style.display = "block";
      document.getElementById("placeholderText").style.display = "none";
    };
    img.src = ev.target.result;
    document.getElementById("preview").src = img.src;
  };

  reader.readAsDataURL(file);
});

function convert() {
  if(!ready){
    alert("Image still loading");
    return;
  }

  const format = document.getElementById("format").value;
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  if(format !== "ico"){
    const url = canvas.toDataURL("image/" + format);
    download(url, "converted." + format);
  } else {
    canvas.toBlob(async blob => {
      const png = new Uint8Array(await blob.arrayBuffer());
      const header = new Uint8Array(22);
      header[2] = 1;
      header[4] = 1;
      header[10] = 1;
      header[12] = 32;
      const view = new DataView(header.buffer);
      view.setUint32(14, png.length, true);
      view.setUint32(18, 22, true);
      const ico = new Uint8Array(header.length + png.length);
      ico.set(header, 0);
      ico.set(png, header.length);
      const blobOut = new Blob([ico], {type: "image/x-icon"});
      const url = URL.createObjectURL(blobOut);
      download(url, "converted.ico");
    });
  }
}

function download(url, name){
  const link = document.getElementById("downloadLink");
  link.href = url;
  link.download = name;
  link.style.display = "block";
  link.innerText = "Download " + name;
}
</script>

</body>
</html>
