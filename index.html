```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Image Converter</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
display:inline-block;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

select{
font-size:16px;
padding:5px;
}

img{
max-width:250px;
margin-top:15px;
}
</style>
</head>

<body>

<h1>Image Converter</h1>

<div class="box">

<input type="file" id="fileInput" accept="image/*"><br><br>

Convert To:
<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
<option value="webp">WEBP</option>
<option value="bmp">BMP</option>
<option value="ico">ICO</option>
</select>

<br><br>

<button onclick="convert()">Convert</button>

<br>

<img id="preview">

<br><br>

<a id="downloadLink" style="display:none">Download</a>

</div>

<script>

let img = new Image()
let loaded=false

document.getElementById("fileInput").addEventListener("change", e=>{

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=ev=>{
img.onload=()=>{loaded=true}
img.src=ev.target.result
document.getElementById("preview").src=img.src
}

reader.readAsDataURL(file)

})

function convert(){

if(!loaded){
alert("Image still loading")
return
}

const format=document.getElementById("format").value

if(format==="ico"){
makeICO()
return
}

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

const url=canvas.toDataURL("image/"+format)

const link=document.getElementById("downloadLink")

link.href=url
link.download="converted."+format
link.innerText="Download "+format.toUpperCase()
link.style.display="inline"

}

async function makeICO(){

const sizes=[16,32,48,256]
let pngBuffers=[]

for(let size of sizes){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=size
canvas.height=size

ctx.drawImage(img,0,0,size,size)

let blob=await new Promise(r=>canvas.toBlob(r,"image/png"))
pngBuffers.push(await blob.arrayBuffer())

}

let headerSize=6+(16*sizes.length)
let totalSize=headerSize

pngBuffers.forEach(b=>totalSize+=b.byteLength)

let buffer=new ArrayBuffer(totalSize)
let view=new DataView(buffer)

view.setUint16(0,0,true)
view.setUint16(2,1,true)
view.setUint16(4,sizes.length,true)

let offset=headerSize

sizes.forEach((size,i)=>{

let entry=6+(i*16)

view.setUint8(entry,size===256?0:size)
view.setUint8(entry+1,size===256?0:size)
view.setUint8(entry+2,0)
view.setUint8(entry+3,0)

view.setUint16(entry+4,1,true)
view.setUint16(entry+6,32,true)

view.setUint32(entry+8,pngBuffers[i].byteLength,true)
view.setUint32(entry+12,offset,true)

new Uint8Array(buffer,offset).set(new Uint8Array(pngBuffers[i]))

offset+=pngBuffers[i].byteLength

})

const blob=new Blob([buffer],{type:"image/x-icon"})
const url=URL.createObjectURL(blob)

const link=document.getElementById("downloadLink")

link.href=url
link.download="converted.ico"
link.innerText="Download ICO"
link.style.display="inline"

}

</script>

</body>
</html>
